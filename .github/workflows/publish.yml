name: Publish

# On a pushed version tag (vX.Y.Z): build, publish to PyPI, and create a GitHub Release.
# Via manual "Run workflow" (workflow_dispatch): build an existing tag and create/refresh
# its GitHub Release only (no PyPI publish) — used to backfill releases for past tags.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to create/refresh a GitHub Release for (e.g. v0.3.0)"
        required: true
        type: string

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On dispatch, build the requested tag; on push, the tag ref is already checked out.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish to PyPI for real tag pushes, never for manual backfill runs.
    if: github.event_name == 'push'
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create / refresh GitHub Release
        uses: softprops/action-gh-release@f3cad8bcbf209fe591aa1823e372c5d96b7fc800  # v2.3.1
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true  # auto-build notes from commits/PRs
          files: dist/*
